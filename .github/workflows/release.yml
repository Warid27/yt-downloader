name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build GUI executable
        shell: cmd
        run: build-gui.bat

      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path "yt-downloader-gui.exe")) {
            throw "yt-downloader-gui.exe was not created"
          }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-downloader-gui
          path: yt-downloader-gui.exe
          if-no-files-found: error

      - name: Set release metadata
        id: release
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            "tag_name=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            "release_name=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            "prerelease=false" >> $env:GITHUB_OUTPUT
          } else {
            $version = "v0.0.$env:GITHUB_RUN_NUMBER"
            "tag_name=$version" >> $env:GITHUB_OUTPUT
            "release_name=$version" >> $env:GITHUB_OUTPUT
            "prerelease=true" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_name }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          files: yt-downloader-gui.exe
